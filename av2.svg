<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg2" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <filter id="glow2"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="200" height="200" rx="20" fill="url(#bg2)"/>
  <rect width="200" height="200" rx="20" fill="none" stroke="#f5c518" stroke-width="3"/>
  <rect x="6" y="6" width="188" height="188" rx="16" fill="none" stroke="#b8860b" stroke-width="1"/>
  <!-- ace card -->
  <rect x="55" y="30" width="90" height="120" rx="10" fill="#0a0a0a" stroke="#f5c518" stroke-width="2"/>
  <rect x="60" y="35" width="80" height="110" rx="7" fill="none" stroke="#b8860b" stroke-width="1" opacity=".5"/>
  <text x="100" y="108" text-anchor="middle" font-size="64" font-family="serif" fill="#f5c518" filter="url(#glow2)">♠</text>
  <text x="68" y="55" text-anchor="middle" font-size="16" font-family="serif" font-weight="900" fill="#f5c518">A</text>
  <text x="132" y="137" text-anchor="middle" font-size="16" font-family="serif" font-weight="900" fill="#f5c518" transform="rotate(180,132,137)">A</text>
  <!-- lightning -->
  <g fill="#f5c518" filter="url(#glow2)" opacity=".8">
    <polygon points="30,50 22,80 32,75 24,105 40,68 30,72"/>
    <polygon points="170,50 162,80 172,75 164,105 180,68 170,72"/>
  </g>
  <!-- label -->
  <rect x="45" y="162" width="110" height="28" rx="6" fill="#0a0800" stroke="#f5c518" stroke-width="1.5"/>
  <text x="100" y="181" text-anchor="middle" font-size="11" font-family="Arial" font-weight="900" fill="#f5c518" letter-spacing="3">ACE SPADE</text>
</svg>

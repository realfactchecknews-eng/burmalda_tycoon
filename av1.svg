<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1200"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <filter id="glow1"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- bg -->
  <rect width="200" height="200" rx="20" fill="url(#bg1)"/>
  <rect width="200" height="200" rx="20" fill="none" stroke="#f5c518" stroke-width="3"/>
  <rect x="6" y="6" width="188" height="188" rx="16" fill="none" stroke="#b8860b" stroke-width="1"/>
  <!-- roulette ring -->
  <circle cx="100" cy="90" r="62" fill="none" stroke="#f5c518" stroke-width="2" opacity=".4"/>
  <circle cx="100" cy="90" r="55" fill="none" stroke="#b8860b" stroke-width="1" stroke-dasharray="4 4"/>
  <!-- crown -->
  <g filter="url(#glow1)" fill="#f5c518">
    <polygon points="100,28 88,48 76,38 80,60 120,60 124,38 112,48" />
    <rect x="78" y="58" width="44" height="8" rx="2"/>
    <circle cx="100" cy="26" r="4"/>
    <circle cx="76" cy="38" r="3"/>
    <circle cx="124" cy="38" r="3"/>
  </g>
  <!-- king card symbol -->
  <text x="100" y="105" text-anchor="middle" font-size="52" font-family="serif" fill="#f5c518" filter="url(#glow1)">♛</text>
  <!-- chips -->
  <circle cx="44" cy="148" r="14" fill="#1a1200" stroke="#f5c518" stroke-width="2"/>
  <circle cx="44" cy="148" r="10" fill="none" stroke="#f5c518" stroke-width="1" stroke-dasharray="3 3"/>
  <circle cx="156" cy="148" r="14" fill="#1a1200" stroke="#f5c518" stroke-width="2"/>
  <circle cx="156" cy="148" r="10" fill="none" stroke="#f5c518" stroke-width="1" stroke-dasharray="3 3"/>
  <!-- label -->
  <rect x="55" y="160" width="90" height="28" rx="6" fill="#0a0800" stroke="#f5c518" stroke-width="1.5"/>
  <text x="100" y="179" text-anchor="middle" font-size="13" font-family="Arial" font-weight="900" fill="#f5c518" letter-spacing="3">KING</text>
</svg>

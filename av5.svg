<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg5" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a0014"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <filter id="glow5"><feGaussianBlur stdDeviation="3.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="200" height="200" rx="20" fill="url(#bg5)"/>
  <rect width="200" height="200" rx="20" fill="none" stroke="#f5c518" stroke-width="3"/>
  <rect x="6" y="6" width="188" height="188" rx="16" fill="none" stroke="#b8860b" stroke-width="1"/>
  <!-- skull -->
  <g filter="url(#glow5)">
    <!-- head -->
    <ellipse cx="100" cy="82" rx="38" ry="36" fill="#111" stroke="#f5c518" stroke-width="2"/>
    <!-- jaw -->
    <rect x="72" y="108" width="56" height="22" rx="6" fill="#111" stroke="#f5c518" stroke-width="2"/>
    <!-- teeth -->
    <rect x="77" y="114" width="9" height="13" rx="2" fill="#000" stroke="#f5c518" stroke-width="1"/>
    <rect x="90" y="114" width="9" height="13" rx="2" fill="#000" stroke="#f5c518" stroke-width="1"/>
    <rect x="103" y="114" width="9" height="13" rx="2" fill="#000" stroke="#f5c518" stroke-width="1"/>
    <rect x="116" y="114" width="8" height="13" rx="2" fill="#000" stroke="#f5c518" stroke-width="1"/>
    <!-- eyes -->
    <ellipse cx="84" cy="80" rx="13" ry="14" fill="#000" stroke="#f5c518" stroke-width="1.5"/>
    <ellipse cx="116" cy="80" rx="13" ry="14" fill="#000" stroke="#f5c518" stroke-width="1.5"/>
    <!-- eye glow -->
    <ellipse cx="84" cy="80" rx="7" ry="8" fill="#f5c518" opacity=".8"/>
    <ellipse cx="116" cy="80" rx="7" ry="8" fill="#f5c518" opacity=".8"/>
    <ellipse cx="84" cy="80" rx="3" ry="3" fill="#000"/>
    <ellipse cx="116" cy="80" rx="3" ry="3" fill="#000"/>
    <!-- nose -->
    <path d="M96,95 L100,88 L104,95 Z" fill="#000" stroke="#f5c518" stroke-width="1"/>
  </g>
  <!-- crossed bones -->
  <g stroke="#f5c518" stroke-width="3" stroke-linecap="round" opacity=".7">
    <line x1="45" y1="150" x2="155" y2="175"/>
    <line x1="155" y1="150" x2="45" y2="175"/>
    <circle cx="42" cy="149" r="6" fill="#111" stroke="#f5c518" stroke-width="2"/>
    <circle cx="158" cy="149" r="6" fill="#111" stroke="#f5c518" stroke-width="2"/>
    <circle cx="42" cy="176" r="6" fill="#111" stroke="#f5c518" stroke-width="2"/>
    <circle cx="158" cy="176" r="6" fill="#111" stroke="#f5c518" stroke-width="2"/>
  </g>
  <!-- label -->
  <rect x="50" y="182" width="100" height="0" rx="6" fill="none"/>
</svg>

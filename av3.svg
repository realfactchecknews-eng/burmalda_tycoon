<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg3" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#0d1a00"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <filter id="glow3"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="200" height="200" rx="20" fill="url(#bg3)"/>
  <rect width="200" height="200" rx="20" fill="none" stroke="#f5c518" stroke-width="3"/>
  <rect x="6" y="6" width="188" height="188" rx="16" fill="none" stroke="#b8860b" stroke-width="1"/>
  <!-- roulette wheel -->
  <circle cx="100" cy="95" r="60" fill="#0a0a00" stroke="#f5c518" stroke-width="2.5" filter="url(#glow3)"/>
  <circle cx="100" cy="95" r="52" fill="none" stroke="#b8860b" stroke-width="1"/>
  <!-- segments -->
  <g opacity=".7">
    <path d="M100,95 L100,43 A52,52 0 0,1 145,69 Z" fill="#8b0000"/>
    <path d="M100,95 L145,69 A52,52 0 0,1 152,95 Z" fill="#111"/>
    <path d="M100,95 L152,95 A52,52 0 0,1 145,121 Z" fill="#8b0000"/>
    <path d="M100,95 L145,121 A52,52 0 0,1 120,140 Z" fill="#111"/>
    <path d="M100,95 L120,140 A52,52 0 0,1 80,140 Z" fill="#006400"/>
    <path d="M100,95 L80,140 A52,52 0 0,1 55,121 Z" fill="#111"/>
    <path d="M100,95 L55,121 A52,52 0 0,1 48,95 Z" fill="#8b0000"/>
    <path d="M100,95 L48,95 A52,52 0 0,1 55,69 Z" fill="#111"/>
    <path d="M100,95 L55,69 A52,52 0 0,1 100,43 Z" fill="#8b0000"/>
  </g>
  <circle cx="100" cy="95" r="52" fill="none" stroke="#f5c518" stroke-width="1"/>
  <circle cx="100" cy="95" r="18" fill="#0a0800" stroke="#f5c518" stroke-width="2"/>
  <circle cx="100" cy="95" r="12" fill="#f5c518" filter="url(#glow3)"/>
  <circle cx="100" cy="95" r="6" fill="#000"/>
  <!-- ball -->
  <circle cx="130" cy="58" r="6" fill="#fff" filter="url(#glow3)"/>
  <!-- label -->
  <rect x="40" y="166" width="120" height="26" rx="6" fill="#0a0800" stroke="#f5c518" stroke-width="1.5"/>
  <text x="100" y="184" text-anchor="middle" font-size="11" font-family="Arial" font-weight="900" fill="#f5c518" letter-spacing="2">ROULETTE</text>
</svg>
